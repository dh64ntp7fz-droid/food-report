services:
  - type: web
    name: food-report
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SUPABASE_URL
        value: https://ieidvazvzulsrfopjvyf.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: RENDER
        value: "true"
